name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: vps-deploy
  cancel-in-progress: false
jobs:
  deploy:
    name: Deploy Alexandria to panel.grupototum.com
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VPS_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Trigger deploy on VPS
        run: |
          ssh -i ~/.ssh/id_deploy \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_DEPLOY_HOST }}
        # Sem comando — ForceCommand do servidor roda /home/deploy/deploy-alexandria.sh
      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/id_deploy
